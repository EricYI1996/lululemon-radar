name: Fetch New Arrivals (all brands)

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-lululemon
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "curl_cffi>=0.7.0"

      - name: Run Lululemon scraper
        run: python scripts/fetch_lululemon.py

      - name: Run all-brands scraper (alo/adan/dfyne/tala/gym)
        if: ${{ always() }}
        run: python scripts/fetch_all_brands.py
        continue-on-error: true

      - name: Commit & push if changed
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          files="lululemon-new.json alo.json adan.json dfyne.json tala.json gym.json"
          tmp_dir="/tmp/new-arrivals-json"
          mkdir -p "$tmp_dir"

          # 1. 先把本次抓取结果暂存到临时目录
          for f in $files; do
            if [ -f "$f" ]; then
              cp "$f" "$tmp_dir/$f"
            else
              echo "skip missing: $f"
            fi
          done

          # 2. 强制同步到远端最新 main（绕开所有冲突）
          git fetch origin main
          git checkout -B main origin/main

          # 3. 把本次 JSON 覆盖回工作区并暂存
          for f in $files; do
            if [ -f "$tmp_dir/$f" ]; then
              cp "$tmp_dir/$f" "$f"
              git add "$f"
            fi
          done

          # 4. 提交并 push；如果 push 再次被并发抢占则 retry 一次
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update new-arrivals JSON ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push origin main || {
              echo "Push rejected, retrying..."
              for f in $files; do
                [ -f "$f" ] && cp "$f" "$tmp_dir/$f"
              done
              git fetch origin main
              git reset --hard origin/main
              for f in $files; do
                if [ -f "$tmp_dir/$f" ]; then
                  cp "$tmp_dir/$f" "$f"
                  git add "$f"
                fi
              done
              if ! git diff --staged --quiet; then
                git commit -m "chore: update new-arrivals JSON ($(date -u +'%Y-%m-%d %H:%M UTC'))"
                git push origin main
              fi
            }
          fi
