name: Fetch New Arrivals (all brands)

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-lululemon
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "curl_cffi>=0.7.0"

      - name: Run Lululemon scraper
        run: python scripts/fetch_lululemon.py

      - name: Run all-brands scraper (alo/adan/dfyne/tala/gym)
        run: python scripts/fetch_all_brands.py
        continue-on-error: true

      - name: Commit & push if changed
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in lululemon-new.json alo.json adan.json dfyne.json tala.json gym.json; do
            [ -f "$f" ] && git add "$f" || echo "skip missing: $f"
          done
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update new-arrivals JSON ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
