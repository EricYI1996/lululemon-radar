name: Fetch Lululemon New Arrivals

on:
  schedule:
    # UTC 02:00 == 北京时间 10:00，每天一次
    - cron: "0 2 * * *"
  # 允许在 Actions 页面手动触发，便于首次验证
  workflow_dispatch:

# 允许 workflow 推送 commit
permissions:
  contents: write

# 同一时间只跑一个，避免重复 commit 冲突
concurrency:
  group: fetch-lululemon
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright + Chromium
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run Lululemon scraper
        run: python scripts/fetch_lululemon.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lululemon-new.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update lululemon-new.json ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
          fi
